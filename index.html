<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Sistem Penggajian</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#4CAF50;
}

.login-box{
    width:350px;
    margin:80px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#45a049;
}

#pesan{
    text-align:center;
    color:red;
}
</style>

</head>
<body>

<div class="login-box">

<h2>LOGIN</h2>

<input type="text" id="username" placeholder="Masukkan Username">

<input type="password" id="password" placeholder="Masukkan Password">

<button onclick="login()">Login</button>

<p id="pesan"></p>

</div>

<script src="script.js"></script>

</body>
</html>
