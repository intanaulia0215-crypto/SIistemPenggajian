<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Sistem Penggajian</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#3498db;
    margin:0;
}

.login-box{
    width:350px;
    margin:60px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    text-align:center;
}

h2,h3{
    color:#333;
}

input{
    width:95%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#27ae60;
}

#pesan{
    color:red;
    font-weight:bold;
}

#hasilKas{
    color:blue;
}
</style>

</head>
<body>

<div class="login-box">

<h2>LOGIN</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="pesan"></p>

<h3>Kas Sederhana</h3>

<input type="number" id="masuk" placeholder="Kas Masuk">

<input type="number" id="keluar" placeholder="Kas Keluar">

<button onclick="hitungKas()">Hitung Kas</button>

<h3 id="hasilKas"></h3>

</div>

<script src="script.js"></script>

</body>
</html>
